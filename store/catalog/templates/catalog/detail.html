{% extends 'base.html' %}
{% load static %}

{% block title %}{{ product.name }}{% endblock %}



{% block sidebar %}{% endblock %}

{% block content %}
    <div>
        <h1>{{ product.name }}</h1>
        <hr>
        <p><img src="{{ product.image.url }}" style="width:500px;height:500px;border:2px solid #CCCCCC;"></p>
        <p>Цена: {{ product.price }}</p>
         <p>{{ product.description }}</p>
    <form action="{% url 'cart:cart_add' product.id %}" method="post">
        {% csrf_token %}
        {{form}}
        <button type="submit">
            Добавить в корзину
        </button>
    </form>
        </div>
{% endblock %}
